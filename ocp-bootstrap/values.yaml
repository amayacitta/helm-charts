argocd:
  enabled: true
  clusters:
    region01:
      enabled: true
      helmValuesFile: values-region01.yaml
      selector:
        matchLabels:
          type: "workload"     
          region: "region01"
    region02:
      enabled: false
      helmValuesFile: values-region02.yaml
      selector:
        matchLabels:
          type: "workload"     
          region: "region02"
  applicationset:
    bootstrap:
      namespace: openshift-gitops
      project: default
      git:
        repoURL: https://github.com/amayacitta/ocp-lab.git
        path: argocd/ocp-bootstrap/*
        targetRevision: HEAD
      # syncPolicy configuration for the ApplicationSet template, applied to all generated Applications
{{- if and .Values.argocd.enabled .Values.argocd.clusters.region02.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ocp-bootstrap-region02
  namespace: {{ .Values.argocd.applicationset.bootstrap.namespace }}
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - matrix:
      generators:
        - git:
            repoURL: {{ .Values.argocd.applicationset.bootstrap.git.repoURL }}
            revision: {{ .Values.argocd.applicationset.bootstrap.git.targetRevision }}
            directories:
            - path: {{ .Values.argocd.applicationset.bootstrap.git.path }}
        - clusters:    
{{- with .Values.argocd.clusters.region02.selector }} 
            selector:
{{ toYaml . | indent 14 -}}
{{ end }}             
  template:      
    metadata:
      name: {{ printf "{{ (split \":\" .name)._0 }}-{{index .path.segments 2}}" | quote }}
    spec:
      project: {{ .Values.argocd.applicationset.bootstrap.project }}
      source:
        repoURL: {{ .Values.argocd.applicationset.bootstrap.git.repoURL }}
        targetRevision: {{ .Values.argocd.applicationset.bootstrap.git.targetRevision }}
        path: {{ printf "{{.path.path}}" | quote }}
        helm:
          valueFiles:
            - {{ .Values.argocd.clusters.region02.helmValuesFile }}
      destination:
        server: {{ printf "{{.server}}" | quote }}
        namespace: {{ printf "{{index .path.segments 2}}" | quote }}
{{- with .Values.argocd.applicationset.bootstrap.syncPolicy }}
      syncPolicy:
{{ toYaml . | indent 8 -}}
{{ end }}
{{ end }}
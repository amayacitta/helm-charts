{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "nginx-lab.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "nginx-lab.fullname" . }}-httproute
  labels:
    {{- include "nginx-lab.labels" . | nindent 4 }}
  annotations:
    # hard set option for external dns to use annotations only
    external-dns.alpha.kubernetes.io/gateway-hostname-source: annotation-only
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.hostnames | join "," }}
    external-dns.alpha.kubernetes.io/ttl: {{ .Values.externaldns.ttl | quote }}
  {{- with .Values.httpRoute.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  hostnames:
  {{- range .Values.hostnames }}
    - {{ . }}
      {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    - matches:
        {{- toYaml .matches | nindent 6 }}
      backendRefs:
      - name: {{ include "nginx-lab.serviceNameForPath" (dict "path" (index .matches 0).path.value "ctx" $) }}
        port: {{ $.Values.httpRoute.backendPort }}
    {{- end }}
{{- end }}

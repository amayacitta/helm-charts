{{- if and .Values.httpRoute.enabled .Values.ingress.enabled -}}
  {{- fail "This chart cannot be rendered with both httpRoute and ingress enabled, please enable one or the other" }}
{{- end }}

{{- if .Values.httpRoute.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nginx-lab.fullname" . }}-root-svc
  labels:
    app.aclab.uk/component: root
    {{- include "nginx-lab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    app.aclab.uk/component: root
    {{- include "nginx-lab.selectorLabels" . | nindent 4 }}
    {{- with .Values.global.labels }}
    {{- toYaml . | nindent 4}}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nginx-lab.fullname" . }}-pink-svc

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "nginx-lab.fullname" . }}-root-pdb
  labels:
    {{- include "nginx-lab.labels" . | nindent 8 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.aclab.uk/component: root
      {{- include "nginx-lab.selectorLabels" . | nindent 6 }}
---

{{- if .Values.HostRule.enabled -}}
apiVersion: ako.vmware.com/v1beta1
kind: HostRule
metadata:
  name: {{ include "nginx-lab.fullname" . }}-hostrule
  labels:
    {{- include "nginx-lab.labels" . | nindent 4 }}
spec:
  virtualhost:
    fqdn: {{ index .Values.hostnames 0 | required "A valid hostname is required!" | quote }}
    fqdnType: Exact
    enableVirtualHost: true
    # tls: # optional
    #   sslKeyCertificate:
    #     name: avi-ssl-key-cert
    #     type: ref
    #     alternateCertificate:
    #       name: avi-ssl-key-cert2
    #       type: ref
    #   sslProfile: avi-ssl-profile
    #   termination: edge
    gslb:
      fqdn: {{ .Values.externaldns.target | required "A valid gslb fqdn is required!" | }}
      includeAliases: false
    # httpPolicy:
    #   policySets:
    #   - avi-secure-policy-ref
    #   overwrite: false
    # datascripts:
    # - avi-datascript-redirect-app1
    wafPolicy: {{ .Values.HostRule.wafPolicy | default "System-WAF-Policy" }}
    # applicationProfile: avi-app-ref
    # networkSecurityPolicy: avi-network-security-policy-ref
    # icapProfile:
    # - avi-icap-ref
    # analyticsProfile: avi-analytics-ref
    # errorPageProfile: avi-errorpage-ref
    # analyticsPolicy: # optional
    #   fullClientLogs:
    #     enabled: true
    #     throttle: HIGH
    #   logAllHeaders: true
    # tcpSettings:
    #   listeners:
    #   - port: 8081
    #   - port: 6443
    #     enableSSL: true
    #   loadBalancerIP: 10.10.10.1
    aliases: # optional
      {{- range slice .Values.hostnames 1 }}
      - {{ . }}
      {{- end }}
    # l7Rule: my-l7-rule-name
{{- end }}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nginx-lab.fullname" . }}-ing
  labels:
    {{- include "nginx-lab.labels" . | nindent 4 }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ .Values.externaldns.target | quote }}
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.hostnames | join "," }}
    external-dns.alpha.kubernetes.io/ttl: {{ .Values.externaldns.ttl | quote }}
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
  - secretName: {{ include "nginx-lab.fullname" . }}-tls-secret
    hosts:
    {{- range .Values.hostnames }}
      - {{ . }}
        {{- end }}
  rules:
    # only create a single rule for the first hostname, additional hostnames will be covered by an AKO hostrule aliases
    - host: {{ index .Values.hostnames 0 | required "A valid hostname is required!" | quote }}
      http:
        paths:
        {{- range $.Values.ingress.rules.http.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "nginx-lab.serviceNameForPath" (dict "path" .path "ctx" $) }}
                port:
                  number: {{ $.Values.service.port }}
        {{- end }}
{{- end }}
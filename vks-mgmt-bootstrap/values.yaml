# Default values for vks-bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Configuration for certificate manager in the parent chart
certmanager:
  enabled: true
  secretName: ""
  ClusterIssuer: 
    name: ""
    secretName: ""
    # intentionally left blank, has to be set by helm --set
    publickey: ""
    privatekey: ""

argocd:
  enabled: true
  vksclusters:
    region01:
      enabled: true
      helmValuesFile: values-region01.yaml
      selector:
        matchLabels:
          type: "workload"     
          region: "region01"
    region02:
      enabled: true
      helmValuesFile: values-region02.yaml
      selector:
        matchLabels:
          type: "workload"     
          region: "region02"
  applicationset:
    vksbootstrap:
      namespace: argocd
      project: default
      git:
        repoURL: https://github.com/amayacitta/vcf9-lab.git
        path: argocd/vks-bootstrap/*
        targetRevision: HEAD
      # syncPolicy configuration for the ApplicationSet template, applied to all generated Applications
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        automated: 
          prune: true
          selfHeal: true
        # add pss baseline labels to the namespaces created by this ApplicationSet
        managedNamespaceMetadata:
          labels:
            pod-security.kubernetes.io/enforce: baseline
        # enable retry logic for application syncs
        retry:
          limit: 5 
          backoff:
            duration: 5s 
            factor: 2 
            maxDuration: 3m 
    vksapps:
      namespace: argocd
      project: default
      git:
        repoURL: https://github.com/amayacitta/vcf9-lab.git
        path: argocd/vks-apps/*
        targetRevision: HEAD
      # syncPolicy configuration for the ApplicationSet template, applied to all generated Applications
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        automated: 
          prune: true
          selfHeal: true
        # add pss baseline labels to the namespaces created by this ApplicationSet
        managedNamespaceMetadata:
          labels:
            pod-security.kubernetes.io/enforce: baseline
        # enable retry logic for application syncs
        retry:
          limit: 5 
          backoff:
            duration: 5s 
            factor: 2 
            maxDuration: 3m 

  
  # force argo to go into this namespace, rather than the one specified in the helm install
  # allows the use of a dependant subchart
  namespaceOverride: "argocd"
  
  global:
    # -- Default domain used by all components
    ## Used for ingresses, certificates, SSO, notifications, etc.
    domain: argocd.aclab.uk
    extraVolumes: 
    # Add custom CA bundle from a ConfigMap:
    - name: rootca
      configMap:
        name: ca-trust-bundle
        items:
          - key: rootca.pem
            path: rootca.pem
    - name: sub01
      configMap:
        name: ca-trust-bundle
        items:
          - key: sub01.pem
            path: sub01.pem
    - name: tanzu-sub01
      configMap:
        name: ca-trust-bundle
        items:
          - key: tanzu-sub01.crt
            path: tanzu-sub01.crt

    # -- Extra volume mounts to add to all deployed Deployments and StatefulSets
    extraVolumeMounts: 
    - name: rootca
      mountPath: /etc/ssl/certs/rootca.pem
      subPath: rootca.pem
    - name: sub01
      mountPath: /etc/ssl/certs/sub01.pem
      subPath: sub01.pem
    - name: tanzu-sub01
      mountPath: /etc/ssl/certs/tanzu-sub01.crt
      subPath: tanzu-sub01.crt

  ## Argo Configs
  configs:
    clusterCredentials: {}
      # mycluster:
      #   server: https://mycluster.example.com
      #   labels: {}
      #   annotations: {}
      #   config:
      #     bearerToken: "<authentication token>"
      #     tlsClientConfig:
      #       insecure: false
      #       caData: "<base64 encoded certificate>"
      # mycluster2:
      #   server: https://mycluster2.example.com
      #   labels: {}
      #   annotations: {}
      #   namespaces: namespace1,namespace2
      #   clusterResources: true
      #   config:
      #     bearerToken: "<authentication token>"
      #     tlsClientConfig:
      #       insecure: false
      #       caData: "<base64 encoded certificate>"
      # mycluster3-project-scoped:
      #   server: https://mycluster3.example.com
      #   labels: {}
      #   annotations: {}
      #   project: my-project1
      #   config:
      #     bearerToken: "<authentication token>"
      #     tlsClientConfig:
      #       insecure: false
      #       caData: "<base64 encoded certificate>"
      # mycluster4-sharded:
      #   shard: 1
      #   server: https://mycluster4.example.com
      #   labels: {}
      #   annotations: {}
      #   config:
      #     bearerToken: "<authentication token>"
      #     tlsClientConfig:
      #       insecure: false
      #       caData: "<base64 encoded certificate>"

    # -- Repositories list to be used by applications
    ## Creates a secret for each key/value specified below to create repositories
    ## Note: the last example in the list would use a repository credential template, configured under "configs.credentialTemplates".
    repositories: {}
      # istio-helm-repo:
      #   url: https://storage.googleapis.com/istio-prerelease/daily-build/master-latest-daily/charts
      #   name: istio.io
      #   type: helm
      # private-helm-repo:
      #   url: https://my-private-chart-repo.internal
      #   name: private-repo
      #   type: helm
      #   password: my-password
      #   username: my-username
      # private-repo:
      #   url: https://github.com/argoproj/private-repo

    # Argo CD sensitive data
    # Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/user-management/#sensitive-data-and-sso-client-secrets
    secret:
      # -- Bcrypt hashed admin password
      ## Argo expects the password in the secret to be bcrypt hashed. You can create this hash with
      ## `htpasswd -nbBC 10 "" $ARGO_PWD | tr -d ':\n' | sed 's/$2y/$2a/'`
      argocdServerAdminPassword: "$2a$10$AkgBqFh0/NEQLhXYUg6ML.ur1WHEjLidDIMg0VQU29GhiuwsnLYsm"

  ## Server
  server:
    # TLS certificate configuration via cert-manager
    ## Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/tls/#tls-certificates-used-by-argocd-server
    certificate:
      # -- Deploy a Certificate resource (requires cert-manager)
      enabled: true
      # -- Certificate Subject Alternate Names (SANs)
      # additionalHosts: 
      #   - argocd.avi.aclab.uk
      issuer:
        # -- Certificate issuer kind. Either `Issuer` or `ClusterIssuer`
        kind: "ClusterIssuer"
        # -- Certificate issuer name. Eg. `letsencrypt`
        name: "tanzu-sub01-clusterissuer"

    service:
      annotations:
        external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
        external-dns.alpha.kubernetes.io/hostname: argocd.aclab.uk
        external-dns.alpha.kubernetes.io/ttl: 30
      type: LoadBalancer
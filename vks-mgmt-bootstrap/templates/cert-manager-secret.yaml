{{- if .Values.certmanager.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.certmanager.ClusterIssuer.secretName | default "tanzu-sub01-tls-secret" }}
  namespace: cert-manager
data:
  tls.crt: {{ .Values.certmanager.ClusterIssuer.publickey | required "A valid publickey is required using helm set!"}}
  tls.key: {{ .Values.certmanager.ClusterIssuer.privatekey | required "A valid privatekey is required using helm set!"}}
{{ end -}}
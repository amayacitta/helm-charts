{{- if .Values.certmanager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{.Values.certmanager.ClusterIssuer.name | default "tanzu-sub01-clusterissuer" }}
  namespace: cert-manager
spec:
  ca:
    secretName: {{ .Values.certmanager.ClusterIssuer.secretName | default "tanzu-sub01-tls-secret" }}
{{ end -}}
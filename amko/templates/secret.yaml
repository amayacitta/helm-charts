{{- if and .Values.gslbLeaderCredentials.username (or .Values.gslbLeaderCredentials.password) -}}
apiVersion: v1
kind: Secret
metadata:
  name: "gslb-avi-secret"
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  username: {{ .Values.gslbLeaderCredentials.username | b64enc }}
  password: {{ .Values.gslbLeaderCredentials.password | b64enc }}#
{{ end -}}